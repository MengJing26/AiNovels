        let currentIndex = diaries.length - 1;
        let autoMode = false;
        let autoInterval = null;

        function renderDiary(index) {
            const diary = diaries[index];
            document.getElementById('diary-content').innerHTML = diary.content;
            document.getElementById('date-display').innerText = `${diary.date} // ${diary.title}`;
            const progress = ((index + 1) / diaries.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').innerText = `${index + 1} / ${diaries.length}`;
            document.querySelectorAll('.flip-btn')[0].disabled = (index === 0);
            document.querySelectorAll('.flip-btn')[2].disabled = (index === diaries.length - 1);
        }

        function nextDay() {
            if (currentIndex < diaries.length - 1) {
                currentIndex++;
                renderDiary(currentIndex);
            }
        }

        function prevDay() {
            if (currentIndex > 0) {
                currentIndex--;
                renderDiary(currentIndex);
            }
        }

        function toggleAuto() {
            autoMode = !autoMode;
            document.getElementById('auto-status').innerText = autoMode ? '开启' : '关闭';
            document.getElementById('auto-toggle').setAttribute('aria-pressed', autoMode);
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
            }
            if (autoMode) {
                autoInterval = setInterval(() => {
                    if (currentIndex < diaries.length - 1) {
                        nextDay();
                    } else {
                        currentIndex = 0;
                        renderDiary(currentIndex);
                    }
                }, 8000);
            }
        }

        // 返回顶部按钮功能
        const backToTopBtn = document.getElementById('backToTop');
        window.addEventListener('scroll', function() {
            if (window.scrollY > 300) {
                backToTopBtn.style.opacity = '1';
                backToTopBtn.style.visibility = 'visible';
            } else {
                backToTopBtn.style.opacity = '0';
                backToTopBtn.style.visibility = 'hidden';
            }
        });

        backToTopBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // 键盘导航支持
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') {
                prevDay();
            } else if (e.key === 'ArrowRight') {
                nextDay();
            }
        });

        // ==================== 成长点评功能 ====================
        const GROWTH_REVIEW_KEY = 'mengjing_growth_reviews';
        const REVIEWS_PER_PAGE = 10;
        let reviewPage = 1;
        let reviewSortNewest = true;

        function getGrowthReviews() {
            try {
                const data = localStorage.getItem(GROWTH_REVIEW_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                console.error('读取成长记录失败:', e);
                return [];
            }
        }

        function saveGrowthReviews(reviews) {
            try {
                localStorage.setItem(GROWTH_REVIEW_KEY, JSON.stringify(reviews));
            } catch (e) {
                console.error('保存成长记录失败:', e);
                showGrowthToast('保存失败，请稍后重试', 'error');
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatReviewTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} 分钟前`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} 小时前`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)} 天前`;

            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
        }

        function showGrowthToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 right-4 z-50 px-6 py-3 rounded-lg font-bold shadow-lg';
            toast.style.cssText = `
                background: ${type === 'error' ? '#ef4444' : '#22c55e'};
                color: white;
                animation: slideIn 0.3s ease-out;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease-in';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function renderGrowthReview(review) {
            const avatarColors = ['from-cyan-500', 'from-pink-500', 'from-purple-500', 'from-green-500', 'from-yellow-500'];
            const colorIndex = review.name.charCodeAt(0) % avatarColors.length;

            const linkHtml = review.link ? 
                `<a href="${escapeHtml(review.link)}" target="_blank" rel="noopener noreferrer" class="text-pink-400 hover:underline text-sm ml-2">查看详情 →</a>` : 
                '';

            return `
                <article class="bg-gray-900/50 border border-gray-700 rounded-lg p-4 hover:border-cyan-400/30 transition-all">
                    <div class="flex items-start gap-3">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br ${avatarColors[colorIndex]} to-gray-800 flex items-center justify-center text-white font-bold flex-shrink-0">
                            ${escapeHtml(review.name.charAt(0).toUpperCase())}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-2 flex-wrap">
                                <span class="font-bold text-cyan-400">${escapeHtml(review.name)}</span>
                                <span class="text-xs px-2 py-1 rounded-full bg-gray-800 text-gray-300">${review.type}</span>
                                <time class="text-gray-600 text-xs">${formatReviewTime(review.timestamp)}</time>
                            </div>
                            <p class="text-gray-300 leading-relaxed break-words mb-2">${escapeHtml(review.content)}</p>
                            ${linkHtml}
                        </div>
                    </div>
                </article>
            `;
        }

        function renderGrowthReviews() {
            const container = document.getElementById('reviews-container');
            const emptyReview = document.getElementById('empty-review');
            const countEl = document.getElementById('review-count');
            const loadMoreContainer = document.getElementById('load-more-reviews');

            let reviews = getGrowthReviews();

            reviews.sort((a, b) => {
                return reviewSortNewest ? b.timestamp - a.timestamp : a.timestamp - b.timestamp;
            });

            countEl.textContent = reviews.length;

            if (reviews.length === 0) {
                emptyReview.classList.remove('hidden');
                loadMoreContainer.classList.add('hidden');
                return;
            }

            emptyReview.classList.add('hidden');

            const endIndex = reviewPage * REVIEWS_PER_PAGE;
            const displayReviews = reviews.slice(0, endIndex);

            container.innerHTML = displayReviews.map(renderGrowthReview).join('');

            if (endIndex < reviews.length) {
                loadMoreContainer.classList.remove('hidden');
            } else {
                loadMoreContainer.classList.add('hidden');
            }
        }

        function handleReviewSubmit(e) {
            e.preventDefault();

            const nameInput = document.getElementById('reviewer-name');
            const linkInput = document.getElementById('reviewer-link');
            const typeInput = document.getElementById('review-type');
            const contentInput = document.getElementById('review-content');

            const name = nameInput.value.trim();
            const link = linkInput.value.trim();
            const type = typeInput.value;
            const content = contentInput.value.trim();

            if (!name || !type || !content) {
                showGrowthToast('请填写必填项', 'error');
                return;
            }

            const newReview = {
                id: Date.now(),
                name: name,
                link: link,
                type: type,
                content: content,
                timestamp: Date.now()
            };

            const reviews = getGrowthReviews();
            reviews.push(newReview);
            saveGrowthReviews(reviews);

            nameInput.value = '';
            linkInput.value = '';
            typeInput.value = '';
            contentInput.value = '';
            document.getElementById('review-char-count').textContent = '0/800';

            reviewPage = 1;
            renderGrowthReviews();

            showGrowthToast('✅ 成长记录发布成功！');

            document.getElementById('reviews-container').scrollIntoView({
                behavior: 'smooth',
                block: 'start'
            });
        }

        function updateReviewCharCount() {
            const contentInput = document.getElementById('review-content');
            const charCount = document.getElementById('review-char-count');
            const count = contentInput.value.length;
            charCount.textContent = `${count}/800`;

            if (count > 700) {
                charCount.classList.add('text-yellow-400');
            } else {
                charCount.classList.remove('text-yellow-400');
            }
        }

        function toggleReviewSort() {
            reviewSortNewest = !reviewSortNewest;
            const sortBtn = document.getElementById('review-sort-btn');
            sortBtn.textContent = reviewSortNewest ? '最新优先 ↓' : '最早优先 ↑';
            reviewPage = 1;
            renderGrowthReviews();
        }

        function loadMoreReviews() {
            reviewPage++;
            renderGrowthReviews();
        }

        function initGrowthReviews() {
            const form = document.getElementById('growth-review-form');
            const contentInput = document.getElementById('review-content');
            const sortBtn = document.getElementById('review-sort-btn');
            const loadMoreBtn = document.getElementById('load-more-reviews-btn');

            form.addEventListener('submit', handleReviewSubmit);
            contentInput.addEventListener('input', updateReviewCharCount);
            sortBtn.addEventListener('click', toggleReviewSort);
            loadMoreBtn.addEventListener('click', loadMoreReviews);

            renderGrowthReviews();
        }

        // 添加动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        window.onload = () => {
            renderDiary(currentIndex);
            initGrowthReviews();
        };
    </script>
