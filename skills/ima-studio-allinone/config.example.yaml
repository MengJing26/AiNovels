# IMA studio All-in-One 配置文件
# 复制为 config.yaml 并修改

# FFmpeg 路径（如果未加入系统PATH，请指定绝对路径）
ffmpeg-path: "ffmpeg"
ffprobe-path: "ffprobe"

# 临时文件目录（确保有写入权限）
temp-dir: "./temp"

# 默认设置
defaults:
  video:
    codec: h264
    crf: 23
    preset: medium
  audio:
    codec: aac
    bitrate: 128k
  concurrent: 2

# 日志级别: debug, info, warn, error
log-level: info

# 是否启用调试模式
debug: false
