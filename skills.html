    .logo {

    .logo:hover {

    }

    .nav-links {

      gap: 2rem;
    }

    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;

    }

    .nav-links a::after {

      bottom: -2px;

      width: 0;
      height: 2px;

  <script>
    'use strict';

    // 分页配置
    const ITEMS_PER_PAGE = 12;
    let currentPage = 1;
    let currentFilter = 'all';
    let currentSearch = '';
    let filteredSkills = [];

    // 标签映射：将技能标签分类为四大类
    const categoryMap = {
      'philosophy': ['philosophy', 'ethics', 'chinese-philosophy', 'logic'],
      'business': ['strategy', 'competition', 'positioning', 'business-model', 'finance', 'investment'],
      'management': ['management', 'leadership', 'organization', 'incentive', 'crisis'],
      'innovation': ['innovation', 'creativity', 'product', 'design', 'interdisciplinarity'],
      'leadership': ['leadership', 'self-discipline', 'team-building', 'chinese-history']
    };

    // 根据标签获取分类
    function getCategories(skill) {
      const categories = [];
      for (const [cat, tags] of Object.entries(categoryMap)) {
        if (skill.tags.some(tag => tags.includes(tag))) {
          categories.push(cat);
        }
      }
      return categories;
    }

    // 生成评分星星
    function renderRating(rating) {
      const fullStars = Math.floor(rating);
      const hasHalf = rating % 1 >= 0.5;
      let stars = '';
      for (let i = 0; i < fullStars; i++) {
        stars += '★';
      }
      if (hasHalf) {
        stars += '½';
      }
      return `${stars} ${rating.toFixed(1)}`;
    }

    // 渲染单个 Skill 卡片
    function renderSkillCard(skill, index) {
      const categories = getCategories(skill);
      const tagsHtml = skill.tags.map(tag => `<span class="tag">#${tag}</span>`).join('');
      const scenariosHtml = skill.scenarios.map(s => `<span class="scenario-pill">${s}</span>`).join('');
      const priceText = skill.pricing.enterprise ? `${skill.pricing.personal}-${skill.pricing.enterprise}` : '自定义';
      const priceNote = skill.pricing.premium ? '(企业版)' : '';

      // 计算差异度标签（热门/新）
      let badge = '';
      const daysSinceCreated = (new Date() - new Date(skill.created)) / (1000 * 60 * 60 * 24);
      if (daysSinceCreated < 7) {
        badge = '<span class="badge badge-new">NEW</span>';
      } else if (skill.rating >= 4.8) {
        badge = '<span class="badge badge-hot">HOT</span>';
      }

      // 核心公式截断
      const formulaDisplay = skill.coreFormula.length > 120
        ? skill.coreFormula.substring(0, 120) + '...'
        : skill.coreFormula;

      // 文件路径（相对）
      const fileLink = skill.file.replace('skills/', '').replace('/SKILL.md', '');

      return `
        <article class="skill-card" data-categories="${categories.join(' ')}" aria-label="${skill.name}">
          ${badge}
          <div class="skill-header">
            <div class="skill-title">
              <div class="skill-icon" aria-hidden="true">${index + 1}</div>
              <div>
                <div class="skill-name">${skill.name}</div>
                <div class="skill-author">${skill.author}</div>
              </div>
            </div>
            <div class="skill-rating" title="综合评分 ${skill.rating}/5" aria-label="评分 ${skill.rating} 星">
              ${renderRating(skill.rating)} / 5
            </div>
          </div>

          <div class="skill-tags" aria-label="标签">${tagsHtml}</div>

          <p class="skill-description">${skill.description}</p>

          <div class="skill-formula" aria-label="核心公式">${formulaDisplay}</div>

          <div class="skill-meta">
            <div class="meta-item">
              <span class="meta-label">文件:</span>
              <span>${fileLink}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">大小:</span>
              <span>${skill.sizeKB} KB</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">版本:</span>
              <span>v${skill.version}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">日期:</span>
              <span>${skill.created}</span>
            </div>
          </div>

          <div class="skill-scenarios">
            <div class="scenarios-title">适用场景：</div>
            <div class="scenario-list" aria-label="适用场景">${scenariosHtml}</div>
          </div>

          <div class="skill-footer">
            <div>
              <span class="price-range">${priceText}</span>
              ${priceNote ? `<span class="price-note">${priceNote}</span>` : ''}
            </div>
            <a href="${skill.file}" class="view-btn" target="_blank" rel="noopener noreferrer" aria-label="查看${skill.name}详情">查看详情</a>
          </div>
        </article>
      `;
    }

    // 渲染分页按钮
    function renderPagination() {
      const totalPages = Math.ceil(filteredSkills.length / ITEMS_PER_PAGE);
      const pagination = document.getElementById('pagination');
      
      if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
      }

      let html = '';
      
      // 上一页按钮
      html += `<button class="pagination-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">上一页</button>`;
      
      // 页码按钮
      const maxVisiblePages = 5;
      let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
      let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
      
      if (endPage - startPage < maxVisiblePages - 1) {
        startPage = Math.max(1, endPage - maxVisiblePages + 1);
      }

      if (startPage > 1) {
        html += `<button class="pagination-btn" onclick="goToPage(1)">1</button>`;
        if (startPage > 2) {
          html += `<span class="pagination-info">...</span>`;
        }
      }

      for (let i = startPage; i <= endPage; i++) {
        html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
          html += `<span class="pagination-info">...</span>`;
        }
        html += `<button class="pagination-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
      }

      // 下一页按钮
      html += `<button class="pagination-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">下一页</button>`;
      
      // 页面信息
      const startItem = (currentPage - 1) * ITEMS_PER_PAGE + 1;
      const endItem = Math.min(currentPage * ITEMS_PER_PAGE, filteredSkills.length);
      html += `<span class="pagination-info">第 ${startItem}-${endItem} 项，共 ${filteredSkills.length} 项</span>`;

      pagination.innerHTML = html;
    }

    // 跳转到指定页
    function goToPage(page) {
      const totalPages = Math.ceil(filteredSkills.length / ITEMS_PER_PAGE);
      if (page < 1 || page > totalPages) return;
      
      currentPage = page;
      renderCurrentPage();
      renderPagination();
      
      // 滚动到顶部
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 渲染当前页的技能
    function renderCurrentPage() {
      const grid = document.getElementById('skills-grid');
      const start = (currentPage - 1) * ITEMS_PER_PAGE;
      const end = start + ITEMS_PER_PAGE;
      const pageSkills = filteredSkills.slice(start, end);
      
      grid.innerHTML = pageSkills.map((skill, idx) => renderSkillCard(skill, start + idx)).join('');
    }

    // 解析商业潜力字符串并提取数值(单位:百万美元)
    // 渲染所有 Skill
    function renderSkills(filter = 'all', search = '') {
      try {
        const grid = document.getElementById('skills-grid');
        if (!grid || typeof skillsData === 'undefined') {
          console.warn('数据未加载或DOM未就绪');
          return;
        }

        const skills = skillsData.skills;
        
        // 先按分类筛选
        let result = filter === 'all'
          ? skills
          : skills.filter(s => getCategories(s).includes(filter));
        
        // 再按搜索词筛选
        if (search && search.trim()) {
          const searchLower = search.toLowerCase().trim();
          result = result.filter(s => 
            s.name.toLowerCase().includes(searchLower) ||
            s.author.toLowerCase().includes(searchLower) ||
            s.description.toLowerCase().includes(searchLower) ||
            s.tags.some(tag => tag.toLowerCase().includes(searchLower))
          );
        }

        filteredSkills = result;
        currentFilter = filter;
        currentSearch = search;
        currentPage = 1;
        
        renderCurrentPage();
        renderPagination();

        // 更新统计
        const totalEl = document.getElementById('total-skills');
        const avgEl = document.getElementById('avg-rating');
        
        if (totalEl) totalEl.textContent = filteredSkills.length;
        if (avgEl) {
          const avg = filteredSkills.length > 0 
            ? (filteredSkills.reduce((sum, s) => sum + s.rating, 0) / filteredSkills.length).toFixed(2)
            : '0.00';
          avgEl.textContent = avg;
        }
      } catch (error) {
        console.error('渲染技能失败:', error);
      }
    }

    // 筛选点击事件 - 支持键盘导航
    document.querySelectorAll('.filter-chip').forEach(chip => {
      const handleFilter = () => {
        document.querySelectorAll('.filter-chip').forEach(c => {
          c.classList.remove('active');
          c.setAttribute('aria-pressed', 'false');
        });
        chip.classList.add('active');
        chip.setAttribute('aria-pressed', 'true');
        const searchValue = document.getElementById('skill-search').value;
        renderSkills(chip.dataset.filter, searchValue);
      };

      chip.addEventListener('click', handleFilter);
      chip.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          handleFilter();
        }
      });
    });

    // 搜索功能
    const searchInput = document.getElementById('skill-search');
    const searchBtn = document.getElementById('search-btn');
    const searchClear = document.getElementById('search-clear');

    function performSearch() {
      const searchValue = searchInput.value;
      // 显示/隐藏清除按钮
      if (searchValue.trim()) {
        searchClear.classList.add('visible');
      } else {
        searchClear.classList.remove('visible');
      }
      renderSkills(currentFilter, searchValue);
    }

    // 搜索按钮点击
    searchBtn.addEventListener('click', performSearch);

    // 回车搜索
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        performSearch();
      }
    });

    // 实时搜索（输入时自动搜索）
    searchInput.addEventListener('input', () => {
      if (searchInput.value.trim()) {
        searchClear.classList.add('visible');
      } else {
        searchClear.classList.remove('visible');
      }
      // 延迟搜索，避免频繁刷新
      clearTimeout(searchInput.searchTimeout);
      searchInput.searchTimeout = setTimeout(performSearch, 300);
    });

    // 清除搜索
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      renderSkills(currentFilter, '');
      searchInput.focus();
    });

    // 初始渲染 - 等待数据加载
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        setTimeout(renderSkills, 100);
      });
    } else {
      setTimeout(renderSkills, 100);
    }

    // 错误处理
    window.addEventListener('error', (e) => {
      console.error('页面错误:', e.message);
    });
  </script>
</body>
</html>
